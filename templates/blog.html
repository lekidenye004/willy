{% extends "base.html" %}
{% block title %}Legal Insights{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="section-title"><h2>Legal Insights</h2></div>
    <div class="row justify-content-center">
      <div class="col-lg-8">
        {% for post in posts %}
          <div class="blog-preview">
            <h4><a href="{{ post.link }}">{{ post.title }}</a></h4>
            <p class="text-muted"><small><i class="far fa-calendar-alt me-1"></i>{{ post.date }}</small></p>
            <p>{{ post.excerpt }}</p>
          </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
